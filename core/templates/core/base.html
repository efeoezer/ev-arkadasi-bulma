<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TypeMatch | Kontrol Paneli{% endblock %}</title>
    <style>
        /* Sitenin Genel ve Modern Teması */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; }
        
        /* Üst Menü (Navbar) */
        .navbar { background-color: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar .logo { font-size: 1.5em; font-weight: bold; letter-spacing: 1px; color: #3498db; text-decoration: none; }
        .navbar .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.95em; transition: color 0.3s; }
        .navbar .nav-links a:hover { color: #3498db; }
        
        /* Ana İçerik Konteyneri */
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    </style>
</head>
<body>
   <nav style="display: flex; gap: 20px; align-items: center;">
    <a href="{% url 'dashboard' %}" style="text-decoration: none; color: #2c3e50; font-weight: bold; font-size: 1em;">Keşfet</a>
    <a href="{% url 'profile' %}" style="text-decoration: none; color: #2c3e50; font-weight: bold; font-size: 1em;">Profilim</a>
    
    <form action="{% url 'logout' %}" method="post" style="margin: 0; padding: 0; display: flex; align-items: center;">
        {% csrf_token %}
        <button type="submit" style="background: none; border: none; color: #e74c3c; font-weight: bold; cursor: pointer; font-size: 1em; padding: 0; margin: 0; font-family: inherit;">Çıkış Yap</button>
    </form>
</nav>
    <div class="main-container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
