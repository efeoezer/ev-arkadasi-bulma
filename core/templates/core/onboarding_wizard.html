<style>
    .wizard-bg { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
    .step-card { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
    .wizard-input { border: 2px solid #eee; padding: 15px; border-radius: 15px; width: 100%; margin-top: 20px; outline: none; transition: 0.3s; }
    .wizard-input:focus { border-color: #3498db; }
</style>

<div class="wizard-bg">
    <div class="step-card">
        <h1 class="fw-bold" style="letter-spacing: -1px;">Hoş Geldin! 👋</h1>
        <p class="text-muted">TypeMatch dünyasına ilk adımını at. Adın nedir?</p>
        
        <form action="{% url 'onboarding' %}" method="POST">
            {% csrf_token %}
            <input type="text" name="first_name" class="wizard-input" placeholder="Adını buraya yaz..." required>
            <input type="text" name="last_name" class="wizard-input" placeholder="Soyadın (İsteğe bağlı)">
            
            <button type="submit" class="btn btn-primary w-100 py-3 mt-4 fw-bold" style="border-radius: 15px; font-size: 1.1em;">
                Başlayalım!
            </button>
        </form>
    </div>
</div>
