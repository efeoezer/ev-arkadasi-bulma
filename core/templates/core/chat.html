<h3>{{ receiver.username }} ile Sohbet</h3>

<div class="chat-box" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll;">
    {% for msg in messages %}
        <p><strong>{{ msg.sender.username }}:</strong> {{ msg.content }}</p>
    {% endfor %}
</div>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="message_text" placeholder="Mesajınızı yazın...">
    <button type="submit">Gönder</button>
</form>
