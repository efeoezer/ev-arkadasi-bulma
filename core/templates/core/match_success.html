{% extends 'core/base.html' %}
{% block content %}
<style>
    .match-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 20, 30, 0.98); backdrop-filter: blur(20px);
        z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center; color: white;
    }
    .match-title {
        font-size: 5em; font-weight: 900; font-style: italic; color: #ff4757;
        text-transform: uppercase; letter-spacing: 3px;
        text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
        animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .match-avatars { display: flex; align-items: center; gap: -20px; margin: 50px 0; }
    .m-avatar {
        width: 180px; height: 180px; border-radius: 50%;
        border: 6px solid white; object-fit: cover;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .a-left { transform: translateX(-50px) rotate(-10deg); animation: slideL 0.7s forwards; }
    .a-right { transform: translateX(50px) rotate(10deg); animation: slideR 0.7s forwards; }
    .fire-icon { font-size: 4em; z-index: 10; filter: drop-shadow(0 0 20px orange); animation: fire 0.5s 0.6s scale forwards; opacity: 0; transform: scale(0); }
    
    @keyframes slideL { to { transform: translateX(20px) rotate(-5deg); } }
    @keyframes slideR { to { transform: translateX(-20px) rotate(5deg); } }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fire { to { transform: scale(1); opacity: 1; } }

    .btn-action {
        background: linear-gradient(45deg, #6c5ce7, #a29bfe);
        color: white; padding: 20px 50px; border-radius: 40px;
        font-size: 1.3em; font-weight: 800; text-decoration: none;
        box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4); transition: 0.3s;
    }
    .btn-action:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(108, 92, 231, 0.6); color: white; }

    .btn-action-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: #bdc3c7;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 15px 40px;
        border-radius: 40px;
        font-size: 1.1em;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        display: block;
        margin-top: 15px;
    }
    .btn-action-secondary:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: #fff;
        color: #fff;
    }
</style>

<div class="match-overlay">
    <h1 class="match-title">EŞLEŞTİNİZ!</h1>
    <p class="fs-4">Sen ve <span class="text-warning fw-bold">{{ matched_with.first_name }}</span> için uyum sağlandı.</p>

    <div class="match-avatars">
        <img src="{{ request.user.profile.userphoto_set.first.image.url }}" class="m-avatar a-left">
        <div class="fire-icon">🔥</div>
        <img src="{{ matched_with.profile.userphoto_set.first.image.url }}" class="m-avatar a-right">
    </div>

    <div class="d-flex flex-column gap-3 w-100 align-items-center" style="max-width: 400px; margin: 0 auto;">
        <a href="{% url 'negotiation_board' match.id %}" class="btn-action text-center w-100">🤝 Pazarlık Masasına Otur</a>
        <a href="{% url 'dashboard' %}" class="btn-action-secondary text-center w-100">Daha Sonra Hallet</a>
    </div>
</div>
{% endblock %}
