{% extends 'core/base.html' %}
{% block content %}
<style>
    .match-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 20, 30, 0.96); backdrop-filter: blur(15px);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; color: white; text-align: center;
    }
    .match-title {
        font-size: 5em; font-weight: 900; color: #ff4757; font-style: italic;
        text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
        animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .match-avatars { display: flex; align-items: center; gap: 0; margin: 50px 0; position: relative; }
    .match-avatar {
        width: 180px; height: 180px; border-radius: 50%; border: 6px solid #fff;
        object-fit: cover; box-shadow: 0 15px 45px rgba(0,0,0,0.6);
    }
    .avatar-left { transform: translateX(-30px) rotate(-10deg); animation: slideL 0.7s ease-out; }
    .avatar-right { transform: translateX(30px) rotate(10deg); animation: slideR 0.7s ease-out; }
    .match-fire { position: absolute; font-size: 4em; z-index: 10; animation: firePop 0.5s 0.6s both; }
    
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes slideL { 0% { transform: translateX(-200px); opacity: 0; } 100% { transform: translateX(-30px) rotate(-10deg); opacity: 1; } }
    @keyframes slideR { 0% { transform: translateX(200px); opacity: 0; } 100% { transform: translateX(30px) rotate(10deg); opacity: 1; } }
    @keyframes firePop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    .btn-match {
        background: linear-gradient(45deg, #ff4757, #ff6b81); color: white !important;
        padding: 20px 50px; border-radius: 40px; font-weight: 800; text-decoration: none;
        box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4); transition: 0.3s;
    }
    .btn-match:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(255, 71, 87, 0.6); }
</style>

<div class="match-overlay">
    <h1 class="match-title">EŞLEŞTİNİZ!</h1>
    <p class="fs-4 text-light mt-2">{{ matched_with.first_name }} ile artık konuşabilirsin!</p>
    
    <div class="match-avatars">
        <img src="{{ request.user.profile.userphoto_set.first.image.url }}" class="match-avatar avatar-left">
        <div class="match-fire">🔥</div>
        <img src="{{ matched_with.profile.userphoto_set.first.image.url }}" class="match-avatar avatar-right">
    </div>

    <div class="mt-4">
        <a href="{% url 'chat_view' matched_with.id %}" class="btn-match">HEMEN MESAJ AT 💬</a>
        <div class="mt-4"><a href="{% url 'dashboard' %}" class="text-white-50 text-decoration-none fw-bold">Kaydırmaya Devam Et</a></div>
    </div>
</div>
{% endblock %}
