{% extends 'core/base.html' %}
{% block title %}TypeMatch | Kriz Masası{% endblock %}

{% block content %}
<style>
    body { background: #0f141e; color: white; overflow-x: hidden; }
    
    .board-container { max-width: 900px; margin: 40px auto; padding: 20px; }
    
    .glass-panel {
        background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
        padding: 40px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .header-bar {
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px;
    }

    .goodwill-badge {
        background: linear-gradient(45deg, #f1c40f, #f39c12); color: #000;
        padding: 10px 25px; border-radius: 30px; font-weight: 900; font-size: 1.2em;
        box-shadow: 0 0 20px rgba(241, 196, 15, 0.4); transition: transform 0.3s;
    }

    /* Kural Kartları (Hazırlık) */
    .rule-row {
        display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px;
        align-items: center; background: rgba(0,0,0,0.3);
        padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid transparent;
    }
    .rule-title { font-weight: 800; font-size: 1.2em; color: #bdc3c7; }
    .custom-select { background: #1e2736; color: white; border: 1px solid #34495e; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
    .ultimatum-btn { background: transparent; color: #e74c3c; border: 2px solid #e74c3c; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .ultimatum-btn.active { background: #e74c3c; color: white; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }

    /* Yüzleşme Kartları */
    .confront-card {
        background: rgba(0,0,0,0.4); border-radius: 15px; padding: 25px; margin-bottom: 20px;
        border-left: 5px solid #555; position: relative; overflow: hidden;
    }
    .confront-card.crisis { border-color: #e74c3c; background: linear-gradient(90deg, rgba(231,76,60,0.1) 0%, rgba(0,0,0,0.4) 100%); }
    .confront-card.agreed { border-color: #2ecc71; background: linear-gradient(90deg, rgba(46,204,113,0.1) 0%, rgba(0,0,0,0.4) 100%); }
    
    .hidden-choice { filter: blur(10px); opacity: 0.5; transition: all 1s ease; }
    .revealed { filter: blur(0); opacity: 1; }

    /* Butonlar */
    .btn-lock { background: linear-gradient(45deg, #3498db, #2980b9); color: white; padding: 15px; width: 100%; font-size: 1.2em; font-weight: 900; border-radius: 15px; border: none; margin-top: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3); }
    .btn-reveal { background: #9b59b6; color: white; padding: 15px; width: 100%; font-size: 1.2em; font-weight: 900; border-radius: 15px; border: none; margin-bottom: 30px; cursor: pointer; box-shadow: 0 10px 20px rgba(155, 89, 182, 0.3); }
    
    .btn-nuke { background: transparent; color: #e74c3c; border: 2px solid #e74c3c; padding: 15px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; text-decoration: none; transition: 0.3s; display: block; text-align: center; margin-top: 40px; }
    .btn-nuke:hover { background: #e74c3c; color: white; box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }

    .action-btn { border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-concede { background: #34495e; color: white; }
    .btn-concede:hover { background: #2ecc71; color: #000; }
</style>

<div class="board-container">
    <div class="header-bar">
        <h2>🤝 Anlaşma Masası</h2>
        <div class="goodwill-badge" id="goodwill-display">⭐ İyi Niyet: 0</div>
    </div>

    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
        <h4 class="mt-3 text-muted">Masa Hazırlanıyor...</h4>
    </div>

    <div id="phase-prep" class="glass-panel" style="display: none;">
        <h3 class="mb-2 text-info">Kurallarını Belirle</h3>
        <p class="text-muted mb-4">Sadece 1 konuda "Kırmızı Çizgi" (Ültimatom) çekebilirsin.</p>
        <div id="prep-rules-container"></div>
        <button class="btn-lock" onclick="lockChoices()">🔒 Seçimleri Kilitle ve Gönder</button>
    </div>

    <div id="phase-confront" class="glass-panel" style="display: none;">
        <h3 class="mb-4 text-warning">Karşı Tarafın Seçimleri Geldi!</h3>
        <button class="btn-reveal" id="btn-reveal" onclick="revealCards()">👁️ Kartları Aç</button>
        <div id="conflict-container"></div>
    </div>

    <button class="btn-nuke" onclick="walkAway()">☢️ MASADAN KALK (Eşleşmeyi Boz)</button>
</div>

<script>
    const MATCH_ID = {{ match.id }};
    const API_URL = `/api/negotiation/${MATCH_ID}/`;
    
    const rulesData = [
        { id: 'cleaning', label: 'Temizlik', options: ['Her Gün', 'Haftalık', 'Gevşek'] },
        { id: 'guests', label: 'Misafir', options: ['Yasak', 'Haberli İzin', 'Serbest'] },
        { id: 'noise', label: 'Gürültü', options: ['Sıfır Tolerans', 'Normal', 'Farketmez'] },
        { id: 'pets', label: 'Evcil Hayvan', options: ['Yasak', 'Kafes', 'Serbest'] }
    ];

    let myChoices = {};
    let oppChoices = {};
    let myUltimatum = null;

// Sayfa Yüklendiğinde Durumu Çek
    fetch(API_URL)
        .then(async res => {
            const isJson = res.headers.get("content-type")?.includes("application/json");
            const data = isJson ? await res.json() : null;

            if (!res.ok) {
                // EĞER 500 HATASIYSA (MIGRATE UNUTULDUYSA) BİZİ UYAR!
                if (res.status === 500) {
                    throw new Error("Sunucu Çöktü (500). Tablo bulunamadı. Lütfen terminalde 'python manage.py makemigrations' ve 'migrate' yapın.");
                }
                throw new Error(data?.message || `HTTP Hatası: ${res.status}`);
            }
            return data;
        })
        .then(data => {
            if (data.status === 'error') throw new Error(data.message);

            document.getElementById('loading').style.display = 'none';
            if (data.user_ready) {
                oppChoices = data.opp_choices;
                renderConfrontation();
            } else {
                renderPrepPhase();
            }
        })
        .catch(err => {
            document.getElementById('loading').innerHTML = `
                <div class="text-center">
                    <h3 class="text-danger mt-4">⚠️ Bir Sorun Oluştu</h3>
                    <div class="alert alert-danger d-inline-block mt-3 text-start" style="max-width: 500px;">
                        <strong>Sistem Mesajı:</strong><br>${err.message}
                    </div>
                    <br>
                    <a href="/dashboard/" class="btn btn-outline-light mt-4">Ana Sayfaya Dön</a>
                </div>
            `;
            console.error("Hata Detayı:", err);
        });

    function renderPrepPhase() {
        document.getElementById('phase-prep').style.display = 'block';
        const container = document.getElementById('prep-rules-container');
        
        rulesData.forEach(rule => {
            myChoices[rule.id] = { choice: rule.options[0], is_ultimatum: false };
            let opts = rule.options.map(o => `<option value="${o}">${o}</option>`).join('');
            
            container.innerHTML += `
                <div class="rule-row" id="row-${rule.id}">
                    <div class="rule-title">${rule.label}</div>
                    <select class="custom-select" onchange="updateChoice('${rule.id}', this.value)">${opts}</select>
                    <button class="ultimatum-btn" id="btn-ult-${rule.id}" onclick="toggleUltimatum('${rule.id}')">Kırmızı Çizgi</button>
                </div>
            `;
        });
    }

    function updateChoice(id, val) { myChoices[id].choice = val; }

    function toggleUltimatum(id) {
        if (myUltimatum === id) {
            myUltimatum = null;
            document.getElementById(`btn-ult-${id}`).classList.remove('active');
        } else {
            if (myUltimatum) document.getElementById(`btn-ult-${myUltimatum}`).classList.remove('active');
            myUltimatum = id;
            document.getElementById(`btn-ult-${id}`).classList.add('active');
        }
        rulesData.forEach(r => myChoices[r.id].is_ultimatum = (r.id === myUltimatum));
    }

    function lockChoices() {
        const btn = document.querySelector('.btn-lock');
        btn.innerText = "Kaydediliyor..."; btn.disabled = true;

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ action: 'lock_choices', choices: myChoices })
        }).then(() => window.location.reload()); // Kaydedip sayfayı yeniler
    }

    function renderConfrontation() {
        document.getElementById('phase-confront').style.display = 'block';
        const container = document.getElementById('conflict-container');
        
        rulesData.forEach(rule => {
            const opp = oppChoices[rule.id] || { choice: "Bekleniyor...", is_ultimatum: false };
            
            container.innerHTML += `
                <div class="confront-card" id="card-${rule.id}">
                    <h4 class="mb-3 text-light">${rule.label}</h4>
                    <div class="d-flex justify-content-between">
                        <div class="p-3 bg-dark rounded w-50 me-2 border border-secondary">
                            <span class="text-muted d-block small">Senin Seçimin</span>
                            <strong class="fs-5">${myChoices[rule.id]?.choice || "Belirsiz"}</strong>
                        </div>
                        <div class="p-3 bg-dark rounded w-50 ms-2 border border-secondary hidden-choice opp-box" id="opp-${rule.id}">
                            <span class="text-muted d-block small">Karşı Taraf</span>
                            <strong class="fs-5">${opp.choice} ${opp.is_ultimatum ? '🔴' : ''}</strong>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Gerilim dolu kart açılış animasyonu
    function revealCards() {
        document.getElementById('btn-reveal').style.display = 'none';
        const boxes = document.querySelectorAll('.opp-box');
        
        boxes.forEach((box, index) => {
            setTimeout(() => {
                box.classList.add('revealed');
                // Açıldıktan sonra kriz var mı kontrol et ve çerçeveyi boya
                const ruleId = box.id.replace('opp-', '');
                const card = document.getElementById(`card-${ruleId}`);
                
                if (myChoices[ruleId]?.choice === oppChoices[ruleId]?.choice) {
                    card.classList.add('agreed');
                    box.innerHTML += '<div class="text-success fw-bold mt-2">✓ UZLAŞILDI</div>';
                } else {
                    card.classList.add('crisis');
                    box.innerHTML += '<div class="text-danger fw-bold mt-2">⚠️ KRİZ</div>';
                }
            }, index * 800); // Her kart 0.8 saniye arayla açılır
        });
    }

    function walkAway() {
        if(confirm("Tüm masayı devirip bu eşleşmeyi tamamen silmek istediğine emin misin?")) {
            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({ action: 'walk_away' })
            }).then(() => window.location.href = '/dashboard/');
        }
    }
</script>
{% endblock %}
