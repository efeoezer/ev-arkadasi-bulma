{% extends 'core/base.html' %}

{% block content %}
<style>
    :root { --primary: #6c5ce7; --secondary: #a29bfe; --success: #00b894; --danger: #d63031; }
    
    .test-body { background: #f9f9fb; min-height: 90vh; display: flex; align-items: center; }
    .glass-card { 
        background: white; border-radius: 30px; padding: 50px; 
        box-shadow: 0 20px 60px rgba(0,0,0,0.05); border: 1px solid #f1f2f6;
        transition: transform 0.3s ease;
    }
    
    /* İlerleme Çubuğu */
    .prog-bg { background: #eee; height: 10px; border-radius: 10px; overflow: hidden; }
    .prog-fill { 
        height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); 
        width: 0%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

    /* Soru Geçiş Animasyonu */
    .fade-in { animation: fadeIn 0.5s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Spektrum Butonları */
    .circle-btn { 
        border-radius: 50%; border: 3px solid; cursor: pointer; background: transparent; 
        transition: all 0.2s; position: relative;
    }
    .circle-btn:hover { transform: scale(1.15); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .circle-btn.selected { transform: scale(1.2); }

    .circle-btn.big { width: 60px; height: 60px; }
    .circle-btn.med { width: 45px; height: 45px; }
    .circle-btn.small { width: 35px; height: 35px; }

    .btn-disagree { border-color: var(--danger); }
    .btn-disagree.selected { background: var(--danger); }
    .btn-agree { border-color: var(--success); }
    .btn-agree.selected { background: var(--success); }
    .btn-neutral { border-color: #b2bec3; }
    .btn-neutral.selected { background: #b2bec3; }

    .label-text { font-weight: 800; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
</style>

<div class="test-body">
    <div class="container d-flex justify-content-center">
        <div class="glass-card text-center w-100" style="max-width: 750px;">
            
            <div id="quiz-ui">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="label-text text-muted" id="step-counter">1 / 12</span>
                    <div class="prog-bg flex-grow-1 mx-3"><div class="prog-fill" id="prog-fill"></div></div>
                </div>

                <div id="question-area" class="fade-in">
                    </div>
            </div>

            <div id="loading-ui" class="d-none py-5">
                <div class="spinner-border text-primary mb-4" style="width: 3rem; height: 3rem;"></div>
                <h2 style="font-weight: 800;">Kişiliğin Analiz Ediliyor...</h2>
                <p class="text-muted">Ev arkadaşı uyum motoru çalıştırılıyor.</p>
            </div>

            <div id="result-ui" class="d-none fade-in">
                <h4 class="text-muted mb-2">ANALİZ TAMAMLANDI</h4>
                <h1 style="font-weight: 900; font-size: 5rem; color: var(--primary);" id="final-mbti">----</h1>
                <p id="save-status" class="mb-4" style="font-weight: 600;"></p>
                <a href="/dashboard/" class="btn btn-primary btn-lg px-5 shadow-lg" style="border-radius: 15px;">Dashboard'a Git ➔</a>
            </div>

        </div>
    </div>
</div>

<script>
    const scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
    let currentIdx = 0;

    const questions = [
        { text: "Yeni ortamlara girdiğimde sessiz kalmak yerine muhabbeti başlatan taraf olurum.", plus: "E", minus: "I" },
        { text: "Planlarımın son dakikada değişmesinden nefret ederim; her şey önceden belli olmalı.", plus: "J", minus: "P" },
        { text: "Duygusal kararlar vermektense mantıklı ve objektif sonuçlara odaklanırım.", plus: "T", minus: "F" },
        { text: "Büyük resme odaklanmak yerine detayları ve somut gerçekleri analiz etmeyi severim.", plus: "S", minus: "N" },
        // ... Diğer 8 soruyu buraya ekleyebilirsin
    ];

    function renderQuestion() {
        if (currentIdx >= questions.length) { showAnalysis(); return; }

        const q = questions[currentIdx];
        document.getElementById('step-counter').innerText = `${currentIdx + 1} / ${questions.length}`;
        document.getElementById('prog-fill').style.width = ((currentIdx / questions.length) * 100) + '%';

        const html = `
            <h2 class="mb-5" style="font-weight: 700; color: #2d3436; min-height: 80px;">${q.text}</h2>
            <div class="d-flex justify-content-between align-items-center gap-2 mb-5">
                <span class="label-text" style="color: var(--danger);">Katılmıyorum</span>
                <div class="d-flex align-items-center gap-3">
                    <button class="circle-btn big btn-disagree" onclick="record(this, -3)"></button>
                    <button class="circle-btn med btn-disagree" onclick="record(this, -2)"></button>
                    <button class="circle-btn small btn-disagree" onclick="record(this, -1)"></button>
                    <button class="circle-btn small btn-neutral" onclick="record(this, 0)"></button>
                    <button class="circle-btn small btn-agree" onclick="record(this, 1)"></button>
                    <button class="circle-btn med btn-agree" onclick="record(this, 2)"></button>
                    <button class="circle-btn big btn-agree" onclick="record(this, 3)"></button>
                </div>
                <span class="label-text" style="color: var(--success);">Katılıyorum</span>
            </div>
        `;
        document.getElementById('question-area').innerHTML = html;
    }

    function record(btn, pts) {
        btn.classList.add('selected');
        const q = questions[currentIdx];
        
        if (pts > 0) scores[q.plus] += pts;
        else if (pts < 0) scores[q.minus] += Math.abs(pts);

        currentIdx++;
        setTimeout(() => {
            document.getElementById('question-area').style.opacity = '0';
            setTimeout(() => {
                renderQuestion();
                document.getElementById('question-area').style.opacity = '1';
            }, 300);
        }, 400);
    }

    function showAnalysis() {
        document.getElementById('quiz-ui').classList.add('d-none');
        document.getElementById('loading-ui').classList.remove('d-none');
        
        const finalType = 
            (scores.E >= scores.I ? 'E' : 'I') +
            (scores.S >= scores.N ? 'S' : 'N') +
            (scores.T >= scores.F ? 'T' : 'F') +
            (scores.J >= scores.P ? 'J' : 'P');

        setTimeout(() => saveAndShow(finalType), 2000);
    }

    async function saveAndShow(mbti) {
        document.getElementById('loading-ui').classList.add('d-none');
        document.getElementById('result-ui').classList.remove('d-none');
        document.getElementById('final-mbti').innerText = mbti;

        const status = document.getElementById('save-status');
        status.innerText = "☁️ Buluta kaydediliyor...";

        try {
            const res = await fetch('/api/save_mbti/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({ mbti: mbti })
            });
            if (res.ok) status.innerHTML = "✅ Kaydedildi! <br> Artık sana uygun ev arkadaşları listelenebilir.";
        } catch (e) {
            status.innerText = "❌ Bağlantı hatası, lütfen sayfayı yenile.";
        }
    }

    renderQuestion();
</script>
{% endblock %}
