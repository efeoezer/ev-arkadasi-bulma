{% extends 'core/base.html' %}
{% block content %}
<style>
    .test-bg { background: #f8f9fc; min-height: 90vh; display: flex; align-items: center; padding: 40px 0; }
    .test-card { background: white; border-radius: 40px; padding: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; max-width: 800px; width: 100%; margin: 0 auto; position: relative; overflow: hidden; }
    
    .spectrum { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 40px 0; }
    .circle { border: 3px solid; border-radius: 50%; cursor: pointer; transition: 0.3s; background: transparent; }
    .circle:hover { transform: scale(1.2); }
    .circle.selected { transform: scale(1.3); }
    
    .c-agree { border-color: #2ecc71; } .c-agree.selected { background: #2ecc71; }
    .c-disagree { border-color: #e74c3c; } .c-disagree.selected { background: #e74c3c; }
    .c-neutral { border-color: #bdc3c7; width: 35px; height: 35px; } .c-neutral.selected { background: #bdc3c7; }
    
    .big { width: 65px; height: 65px; } .med { width: 50px; height: 50px; } .small { width: 40px; height: 40px; }
    
    .fade-out { opacity: 0; transform: translateX(-30px); transition: 0.4s; }
    .fade-in { opacity: 1; transform: translateX(0); transition: 0.4s; }
</style>

<div class="test-bg">
    <div class="test-card">
        <div id="quiz-header">
            <div class="progress mb-4" style="height: 10px; border-radius: 20px;">
                <div id="prog" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%; background: #6c5ce7;"></div>
            </div>
            <h6 class="text-muted fw-bold" id="counter">Soru 1 / 12</h6>
        </div>

        <div id="question-container" class="fade-in">
            <h2 class="fw-bold mb-5" id="q-text" style="color: #2d3436; line-height: 1.4;">Yükleniyor...</h2>
            
            <div class="spectrum">
                <span class="fw-bold text-danger small">KATILMIYORUM</span>
                <div class="circle big c-disagree" onclick="record(-3)"></div>
                <div class="circle med c-disagree" onclick="record(-2)"></div>
                <div class="circle small c-disagree" onclick="record(-1)"></div>
                <div class="circle c-neutral" onclick="record(0)"></div>
                <div class="circle small c-agree" onclick="record(1)"></div>
                <div class="circle med c-agree" onclick="record(2)"></div>
                <div class="circle big c-agree" onclick="record(3)"></div>
                <span class="fw-bold text-success small">KATILIYORUM</span>
            </div>
        </div>

        <div id="loading" class="d-none">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
            <h3 class="mt-4 fw-bold">Karakterin Analiz Ediliyor...</h3>
        </div>
    </div>
</div>

<script>
    const questions = [
        { text: "Yeni insanlarla tanışmak beni yormak yerine bana enerji verir.", p: "E", m: "I" },
        { text: "Genelde detaylara odaklanmak yerine büyük resmi görmeyi tercih ederim.", p: "N", m: "S" },
        { text: "Kararlarımı alırken mantıksal analizler duygulardan daha önemlidir.", p: "T", m: "F" },
        { text: "Planlı yaşamak yerine spontane olmayı daha çok severim.", p: "P", m: "J" },
        { text: "Bir arkadaşım üzgün olduğunda ona çözüm sunmak yerine duygusal destek veririm.", p: "F", m: "T" },
        { text: "Hafta sonları evde kalmak dışarı çıkmaktan daha caziptir.", p: "I", m: "E" },
        { text: "İşlerimi her zaman son dakikaya bırakmak yerine önceden bitiririm.", p: "J", m: "P" },
        { text: "Teorik tartışmalar somut olaylardan daha çok ilgimi çeker.", p: "N", m: "S" },
        { text: "Etrafımdaki insanların ne hissettiği benim için çok kritiktir.", p: "F", m: "T" },
        { text: "Çalışma masam genelde dağınıktır ama aradığımı bulurum.", p: "P", m: "J" },
        { text: "Düşüncelerimi sesli söylemeden önce içimde tartarım.", p: "I", m: "E" },
        { text: "Gelecek planlarım bugünkü rahatlığımdan daha önemlidir.", p: "J", m: "P" }
    ];

    let current = 0;
    const results = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function record(val) {
        const q = questions[current];
        if (val > 0) results[q.p] += val;
        else if (val < 0) results[q.m] += Math.abs(val);

        current++;
        document.getElementById('question-container').classList.add('fade-out');
        
        setTimeout(() => {
            if (current < questions.length) {
                updateUI();
                document.getElementById('question-container').classList.remove('fade-out');
            } else {
                finish();
            }
        }, 400);
    }

    function updateUI() {
        document.getElementById('q-text').innerText = questions[current].text;
        document.getElementById('counter').innerText = `Soru ${current + 1} / 12`;
        document.getElementById('prog').style.width = (current / 12 * 100) + '%';
    }

    async function finish() {
        document.getElementById('quiz-header').classList.add('d-none');
        document.getElementById('question-container').classList.add('d-none');
        document.getElementById('loading').classList.remove('d-none');

        const mbti = (results.E >= results.I ? 'E' : 'I') + (results.S >= results.N ? 'S' : 'N') + 
                     (results.T >= results.F ? 'T' : 'F') + (results.J >= results.P ? 'J' : 'P');

        await fetch('/api/save_mbti/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ mbti: mbti })
        });
        window.location.href = '/dashboard/';
    }

    updateUI();
</script>
{% endblock %}
